<!DOCTYPE html>
<html>
<head>
  <title>Books</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f9f9f9;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    li {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>Books List</h2>

<button onclick="getBooks()">Load Books</button>

<ul id="bookList"></ul>

<script>
async function getBooks() {
  const res = await fetch("http://localhost:5000/books");
  const data = await res.json();

  const bookList = document.getElementById("bookList");
  bookList.innerHTML = "";

  data.forEach(book => {
    const li = document.createElement("li");
    li.innerText = `${book.title} - ${book.author}`;
    bookList.appendChild(li);
  });
}
</script>

</body>
</html>
