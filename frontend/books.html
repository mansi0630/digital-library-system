<!DOCTYPE html>
<html>
<head>
  <title>Books Page</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f9f9f9;
    }

    button {
      padding: 10px;
      background-color: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: darkgreen;
    }

    ul {
      list-style-type: none;
    }

    li {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
    }
  </style>

</head>
<body>

<h2>Books List</h2>

<button onclick="getBooks()">Load Books</button>

<ul id="bookList"></ul>

<script>
async function getBooks() {
  const res = await fetch("http://localhost:5000/books");
  const data = await res.json();

  const bookList = document.getElementById("bookList");
  bookList.innerHTML = "";

  data.forEach(book => {
    const li = document.createElement("li");
    li.innerText = `Title: ${book.title}, Author: ${book.author}, Category: ${book.category}`;
    bookList.appendChild(li);
  });
}
</script>

</body>
</html>
